<<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добро пожаловать неля или полина или ваще богдан ну или ктото еще хз </title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Courier New', Courier, monospace; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* Приветственный экран */
        #welcome-screen { text-align: center; z-index: 10; padding: 20px; transition: opacity 0.5s ease; }
        h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; text-shadow: 0 0 10px #ff0000; }
        .btn { background: #ff0000; color: #fff; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 5px; box-shadow: 0 0 15px #ff0000; transition: 0.3s ease; }
        .btn:hover { background: #fff; color: #000; box-shadow: 0 0 25px #fff; }

        /* Окно предупреждения (Изначально скрыто) */
        #alert-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); z-index: 20; justify-content: center; align-items: center; padding: 20px; opacity: 0; transition: opacity 0.5s ease; }
        .modal-content { background: #111; border: 2px solid #ff0000; padding: 30px; border-radius: 10px; max-width: 500px; width: 100%; text-align: center; box-shadow: 0 0 30px rgba(255, 0, 0, 0.4); }
        .modal-content h2 { color: #ff0000; font-size: 1.8rem; margin-bottom: 15px; text-transform: uppercase; }
        .modal-content p { font-size: 1rem; line-height: 1.5; margin-bottom: 25px; color: #ccc; }
        .modal-buttons { display: flex; gap: 15px; justify-content: center; }
        .btn-modal { padding: 10px 25px; font-size: 1rem; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; text-transform: uppercase; transition: 0.2s; }
        .btn-accept { background: #00ff00; color: #000; box-shadow: 0 0 10px #00ff00; }
        .btn-accept:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        .btn-decline { background: #333; color: #fff; }
        .btn-decline:hover { background: #555; }
    </style>
</head>
<body>

    <!-- Экран входа -->
    <div id="welcome-screen">
        <h1>Добро пожаловать неля или полина или ваще богдан ну или ктото еще хз </h1>
        <button class="btn" onclick="startHardcore()">Продолжить</button>
    </div>

    <!-- Модальное окно предупреждения -->
    <div id="alert-modal">
        <div class="modal-content">
            <h2>⚠️ ВНИМАНИЕ! Предупреждение</h2>
            <p>Вы согласны на автоматическую обработку ваших персональных данных, включая куки, IP-адрес, чувство юмора и уровень хардкора?</p>
            <div class="modal-buttons">
                <button class="btn-modal btn-accept" onclick="acceptData()">Да, согласен</button>
                <button class="btn-modal btn-decline" onclick="declineData()">Да,согласна</button>
            </div>
        </div>
    </div>

    <!-- Фоновая музыка -->
    <audio id="bg-audio" src="music.mp3" loop></audio>

    <script>
        function startHardcore() {
            const welcomeScreen = document.getElementById('welcome-screen');
            const alertModal = document.getElementById('alert-modal');
            const audio = document.getElementById('bg-audio');

            // Включаем тихую музыку (20% громкости)
            audio.volume = 0.2;
            audio.play().catch(err => console.log("Браузер заблокировал автовоспроизведение:", err));

            // Плавное скрытие первого экрана и показ предупреждения
            welcomeScreen.style.opacity = '0';
            setTimeout(() => {
                welcomeScreen.style.display = 'none';
                alertModal.style.display = 'flex';
                // Задержка для плавного появления окна
                setTimeout(() => alertModal.style.opacity = '1', 50);
            }, 500);
        }

        // Если пользователь нажал "Да, согласен"
        function acceptData() {
            alert("Доступ разрешен. Добро пожаловать в систему!");
            // Здесь можно прописать дальнейшее действие, например перенаправить на другой сайт:
            // window.location.href = "https://google.com";
        }

        // Если пользователь нажал "Нет, уйти"
        function declineData() {
            alert("Доступ заблокирован. Вы будете перенаправлены.");
            // Закрываем вкладку или уводим на безопасную страницу
            window.location.href = "https://yandex.ru";
        }
    </script>
</body>
</html>
