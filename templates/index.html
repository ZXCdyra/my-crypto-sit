<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-sidebar: #1e293b;
            --bg-topbar: #ffffff;
            --bg-content: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --text-sidebar: #94a3b8;
            --border-color: #e2e8f0;
            --sidebar-hover: #334155;
        }

        [data-theme="gray"] {
            --bg-body: #e2e8f0;
            --bg-sidebar: #475569;
            --bg-topbar: #cbd5e1;
            --bg-content: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #475569;
            --text-sidebar: #cbd5e1;
            --border-color: #94a3b8;
            --sidebar-hover: #334155;
        }

        [data-theme="black"] {
            --bg-body: #090d16;
            --bg-sidebar: #111827;
            --bg-topbar: #1f2937;
            --bg-content: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --text-sidebar: #9ca3af;
            --border-color: #374151;
            --sidebar-hover: #374151;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-body);
            color: var(--text-main);
        }

        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            color: #0f172a;
        }

        .login-box h2 { margin-bottom: 20px; text-align: center; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #64748b; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; }
        .login-btn { width: 100%; padding: 12px; background-color: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .login-btn:hover { background-color: #1d4ed8; }
        .error-msg { color: #dc2626; font-size: 0.9rem; margin-top: 10px; text-align: center; display: none; }

        .sidebar {
            width: 250px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .sidebar-logo {
            padding: 0 20px 30px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-menu { list-style: none; margin-top: 20px; }
        .sidebar-item button { width: 100%; padding: 15px 20px; background: none; border: none; color: var(--text-sidebar); text-align: left; font-size: 1rem; cursor: pointer; }
        .sidebar-item button:hover, .sidebar-item button.active { background-color: var(--sidebar-hover); color: #fff; }

        .main-wrapper { flex: 1; display: flex; flex-direction: column; }

        .topbar {
            height: 60px;
            background-color: var(--bg-topbar);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 30px;
            gap: 30px;
        }

        .info-item { font-size: 0.95rem; }
        .info-label { color: var(--text-muted); margin-right: 5px; }
        .info-value { font-weight: 600; color: var(--text-main); }
        .logout-btn { background: none; border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 4px; color: var(--text-main); cursor: pointer; font-size: 0.85rem; }
        .logout-btn:hover { background-color: var(--bg-body); }

        .content-area { padding: 30px; flex: 1; overflow-y: auto; }
        
        .dashboard-row {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .chart-container {
            flex: 3;
            background-color: var(--bg-content);
            padding: 24px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            min-height: 350px;
            min-width: 0;
        }

        .rates-badge {
            flex: 1;
            max-width: 260px;
            background-color: var(--bg-content);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
            height: fit-content;
        }

        .rate-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            border-bottom: 1px dotted var(--border-color);
            padding-bottom: 4px;
        }

        .rate-range { font-weight: 500; }
        .rate-percent { color: #2563eb; font-weight: bold; }

        .card { background-color: var(--bg-content); padding: 24px; border-radius: 8px; border: 1px solid var(--border-color); margin-top: 20px; }
        .theme-switcher { display: flex; gap: 10px; margin-top: 15px; }
        .theme-btn { padding: 10px 20px; border: 1px solid var(--border-color); background-color: var(--bg-body); color: var(--text-main); cursor: pointer; border-radius: 6px; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-overlay">
        <div class="login-box">
            <h2>Авторизация</h2>
            <div class="input-group">
                <label for="username">Логин</label>
                <input type="text" id="username" placeholder="Введите логин">
            </div>
            <div class="input-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="Введите пароль">
            </div>
            <button class="login-btn" onclick="tryLogin()">Войти</button>
            <div id="error-text" class="error-msg">Неверный логин или пароль</div>
        </div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-logo">MY DASHBOARD</div>
        <ul class="sidebar-menu">
            <li class="sidebar-item"><button id="btn-main" class="menu-btn active" onclick="openTab(event, 'main')">Главная</button></li>
            <li class="sidebar-item"><button class="menu-btn" onclick="openTab(event, 'deals')">Сделки</button></li>
            <li class="sidebar-item"><button class="menu-btn" onclick="openTab(event, 'appeals')">Апелляции</button></li>
            <li class="sidebar-item"><button class="menu-btn" onclick="openTab(event, 'payouts')">Выплаты</button></li>
            <li class="sidebar-item"><button class="menu-btn" onclick="openTab(event, 'devices')">Устройства</button></li>
            <li class="sidebar-item"><button class="menu-btn" onclick="openTab(event, 'settings')">Настройки</button></li>
        </ul>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="info-item"><span class="info-label">ID:</span><span class="info-value" id="user-id">0</span></div>
            <div class="info-item"><span class="info-label">Баланс:</span><span class="info-value" id="user-balance">0.00 ₽</span></div>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </header>

        <main class="content-area">
            <div id="main" class="tab-content active">
                <h1>Главная страница</h1>
                <div class="dashboard-row">
                    <div class="chart-container">
                        <canvas id="earningsChart"></canvas>
                    </div>
                    <div class="rates-badge">
                        <div class="rate-row"><span class="rate-range">100 - 999</span><span class="rate-percent">13%</span></div>
                        <div class="rate-row"><span class="rate-range">1000 - 4999</span><span class="rate-percent">8%</span></div>
                        <div class="rate-row"><span class="rate-range">5000 - 30000</span><span class="rate-percent">7%</span></div>
                    </div>
                </div>
            </div>
            
            <div id="deals" class="tab-content"><h1>Сделки</h1><div class="card"><p>Список сделок.</p></div></div>
            <div id="appeals" class="tab-content"><h1>Апелляции</h1><div class="card"><p>История споров.</p></div></div>
            <div id="payouts" class="tab-content"><h1>Выплаты</h1><div class="card"><p>Запросы выплат.</p></div></div>
            <div id="devices" class="tab-content"><h1>Устройства</h1><div class="card"><p>Подключенные устройства.</p></div></div>
            <div id="settings" class="tab-content">
                <h1>Настройки</h1>
                <div class="card">
                    <h3>Выбор темы:</h3>
                    <div class="theme-switcher">
                        <button class="theme-btn" onclick="setTheme('white')">Белая</button>
                        <button class="theme-btn" onclick="setTheme('gray')">Серая</button>
                        <button class="theme-btn" onclick="setTheme('black')">Черная</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const usersDB = [
            { id: 1, login: "alphanode", pass: "kX9!v2mP", balance: "1450.00", chartData: [100, 150, 300, 250, 400, 550, 700] },
            { id: 2, login: "vortex_dev", pass: "bN4@7tZs", balance: "8900.50", chartData: [500, 700, 600, 900, 1200, 1100, 1500] },
            { id: 3, login: "shadow_fox", pass: "mL1$qR9x", balance: "0.00",    chartData: [0, 0, 0, 0, 0, 0, 0] },
            { id: 4, login: "cyber_pixel", pass: "wP8#5jYt", balance: "320.00",  chartData: [50, 30, 70, 40, 90, 60, 120] },
            { id: 5, login: "nexus_user", pass: "gH3&dT6k", balance: "12050.00", chartData: [1000, 1500, 1300, 1800, 2200, 2500, 3000] },
            { id: 6, login: "quantum_7", pass: "cC5(mK2w", balance: "550.00",  chartData: [100, 80, 120, 90, 150, 130, 200] },
            { id: 7, login: "iron_forge", pass: "rX1)9zLb", balance: "24100.00", chartData: [2000, 2500, 3100, 2800, 3500, 4200, 5000] },
            { id: 8, login: "apex_pred", pass: "fV7*4pQs", balance: "7500.00",  chartData: [400, 600, 550, 800, 1000, 950, 1300] },
            { id: 9, login: "matrix_code", pass: "tN3_8vHm", balance: "430.00",  chartData: [40, 60, 50, 80, 70, 90, 110] },
            { id: 10, login: "stellar_sky", pass: "jK2!6xYw", balance: "1850.00", chartData: [200, 250, 400, 350, 500, 600, 800] }
        ];

        let earningsChart = null;

        function checkAuth() {
            const currentUserId = sessionStorage.getItem('currentUserId');
            if (currentUserId) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('user-id').innerText = currentUserId;
                
                const currentUser = usersDB.find(u => u.id == currentUserId);
                if (currentUser) {
                    document.getElementById('user-balance').innerText = parseFloat(currentUser.balance).toFixed(2) + ' ₽';
                }

                resetToMainContent();
                initChart(currentUser ? currentUser.chartData : [0,0,0,0,0,0,0]); 
            } else {
                document.getElementById('login-screen').style.display = 'flex';
            }
            setTheme(localStorage.getItem('theme') || 'white');
        }

        function tryLogin() {
            const loginInput = document.getElementById('username').value.trim();
            const passInput = document.getElementById('password').value.trim();
            const errorText = document.getElementById('error-text');

            const user = usersDB.find(u => u.login === loginInput && u.pass === passInput);

            if (user) {
                sessionStorage.setItem('currentUserId', user.id);
                errorText.style.display = 'none';
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                checkAuth();
            } else {
                errorText.style.display = 'block';
            }
        }

        function logout() {
            if (earningsChart) {
                earningsChart.destroy();
                earningsChart = null;
            }
            sessionStorage.removeItem('currentUserId');
            checkAuth();
        }

        // --- ДОБАВЛЕНО И ИСПРАВЛЕНО НАЧАЛО БЛОКА ---
        
        // Функция, которая запрашивает данные у вашего app.py и выводит их в новом формате
        async function loadDealsFromRosplat() {
            const dealsContainer = document.getElementById('deals');
            
            // Анимация загрузки
            dealsContainer.innerHTML = '<h1>Сделки</h1><div class="card"><p>Синхронизация с РосПлат... Пожалуйста, подождите.</p></div>';
            
            try {
                const response = await fetch('/api/rosplat-data');
                const result = await response.json();
                
                if (result.status === 'success' && result.data.length > 0) {
                    let tableHTML = `
                        <h1>Активные сделки</h1>
                        <div class="card" style="overflow-x: auto; padding: 0; margin-top: 20px;">
                            <table style="width:100%; border-collapse: collapse; text-align:left; font-size: 0.95rem;">
                                <thead>
                                    <tr style="border-bottom: 2px solid var(--border-color); background-color: var(--bg-body); font-weight:600; color: var(--text-muted);">
                                        <td style="padding:15px;">ID</td>
                                        <td style="padding:15px;">Банк</td>
                                        <td style="padding:15px;">Метод</td>
                                        <td style="padding:15px;">Реквизиты</td>
                                        <td style="padding:15px;">Сумма</td>
                                        <td style="padding:15px;">Время и Дата</td>
                                    </tr>
                                </thead>
                                <tbody>`;
                    
                    result.data.forEach(item => {
                        tableHTML += `
                            <tr style="border-bottom: 1px solid var(--border-color);">
                                <td style="padding:15px; font-weight:600; color: #2563eb;">${item.id}</td>
                                <td style="padding:15px; font-weight: 500;">${item.bank}</td>
                                <td style="padding:15px;"><span style="background: var(--bg-body); border: 1px solid var(--border-color); padding: 4px 8px; border-radius: 4px; font-size: 0.85rem;">${item.method}</span></td>
                                <td style="padding:15px; font-family: monospace; letter-spacing: 0.5px;">${item.credentials}</td>
                                <td style="padding:15px; font-weight:600; color: #10b981; font-size: 1rem;">${item.amount}</td>
                                <td style="padding:15px; font-size: 0.85rem; color: var(--text-muted); line-height: 1.4;">
                                    <strong>${item.time}</strong><br>${item.date}
                                </td>
                            </tr>`;
                    });
                    
                    tableHTML += `</tbody></table></div>`;
                    dealsContainer.innerHTML = tableHTML;
                } else {
                    dealsContainer.innerHTML = '<h1>Сделки</h1><div class="card"><p>Активных сделок в данный момент не найдено.</p></div>';
                }
            } catch (error) {
                dealsContainer.innerHTML = '<h1>Сделки</h1><div class="card"><p style="color:red;">Ошибка получения данных: ' + error.message + '</p></div>';
            }
        }

        // Модифицированная функция переключения вкладок, чтобы при нажатии на "Сделки" запускался сбор данных
        function openTab(e, tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if (e && e.currentTarget) {
                e.currentTarget.classList.add('active');
            }
            
            // Если пользователь перешел в раздел сделок — инициируем запрос к РосПлат
            if (tabId === 'deals') {
                loadDealsFromRosplat();
            }
        }

        // --- КОНЕЦ ИЗМЕНЕНИЙ ---

        function resetToMainContent() {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('main').classList.add('active');
            document.getElementById('btn-main').classList.add('active');
        }

        function setTheme(themeName) {
            if (themeName === 'white') document.documentElement.removeAttribute('data-theme');
            else document.documentElement.setAttribute('data-theme', themeName);
            localStorage.setItem('theme', themeName);
            
            if (earningsChart) {
                const textStyle = themeName === 'black' ? '#f9fafb' : '#0f172a';
                const gridStyle = themeName === 'black' ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)';
                
                earningsChart.options.scales.x.grid.color = gridStyle;
                earningsChart.options.scales.y.grid.color = gridStyle;
                earningsChart.options.scales.x.ticks.color = textStyle;
                earningsChart.options.scales.y.ticks.color = textStyle;
                earningsChart.options.plugins.legend.labels.color = textStyle;
                earningsChart.update();
            }
        }

        function initChart(chartData) {
            const ctx = document.getElementById('earningsChart').getContext('2d');
            if (earningsChart) { earningsChart.destroy(); }

            const currentTheme = localStorage.getItem('theme') || 'white';
            const textStyle = currentTheme === 'black' ? '#f9fafb' : '#0f172a';
            const gridStyle = currentTheme === 'black' ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)';

            earningsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'],
                    datasets: [{
                        label: 'Заработано средств (₽)',
                        data: chartData,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: textStyle } } },
                    scales: {
                        x: { grid: { color: gridStyle }, ticks: { color: textStyle } },
                        y: { grid: { color: gridStyle }, ticks: { color: textStyle } }
                    }
                }
            });
        }

        window.onload = checkAuth;
    </script>
