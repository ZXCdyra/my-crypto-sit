<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оплата успешно завершена</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 100px 20px; background: #f4f7f6; }
        .success-box { background: white; padding: 40px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .icon { font-size: 60px; color: #27ae60; margin-bottom: 20px; }
        h1 { color: #333; }
        p { color: #666; font-size: 18px; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 25px; background: #ef3124; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="success-box">
        <div class="icon">✓</div>
        <h1>Оплата прошла успешно!</h1>
        <p>Благодарим за покупку доступа к CryptoAnalytics.</p>
        <p>Инструкции по доступу отправлены на вашу почту, <br>указанную при оплате.</p>
        <a href="/" class="btn">Вернуться на главную</a>
    </div>
</body>
</html>
